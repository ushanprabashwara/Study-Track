<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reports — StudyTrack</title>
<meta name="description" content="Visual reports: completion rate, course breakdown, and priority distribution.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content fade-in">
      <div class="row g-3 mb-3">
        <div class="col-6 col-md-3"><div class="stat-card"><div class="icon bg-brand"><i class="bi bi-journal-bookmark"></i></div><div><div class="label">Courses</div><div class="value" id="rCourses">0</div></div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><div class="icon" style="background:#6366f1"><i class="bi bi-list-check"></i></div><div><div class="label">Assignments</div><div class="value" id="rAssignments">0</div></div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><div class="icon" style="background:#16a34a"><i class="bi bi-percent"></i></div><div><div class="label">Completion</div><div class="value" id="rRate">0%</div></div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><div class="icon" style="background:#dc2626"><i class="bi bi-exclamation-octagon"></i></div><div><div class="label">Overdue</div><div class="value" id="rOverdue">0</div></div></div></div>
      </div>
      <div class="row g-3">
        <div class="col-lg-4"><div class="panel"><h2>Status Breakdown</h2><canvas id="statusPie" height="220"></canvas></div></div>
        <div class="col-lg-8"><div class="panel"><h2>Assignments by Course</h2><canvas id="courseBar" height="220"></canvas></div></div>
        <div class="col-12"><div class="panel"><h2>Priority Distribution</h2><canvas id="priorityBar" height="120"></canvas></div></div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/reports.js"></script>
<script>renderLayout('Reports'); initReportsPage();</script>
</body>
</html>
