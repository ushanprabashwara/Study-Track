<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Courses — StudyTrack</title>
<meta name="description" content="Manage your courses: add, edit, and track per-course progress.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content fade-in">
      <div class="panel">
        <div class="d-flex flex-wrap align-items-center justify-content-between mb-3 gap-2">
          <div>
            <h2 class="mb-0">All Courses</h2>
            <small class="text-muted">Organize your semester courses</small>
          </div>
          <button class="btn btn-brand" id="addCourseBtn"><i class="bi bi-plus-lg me-1"></i> Add Course</button>
        </div>
        <div class="table-responsive">
          <table class="table align-middle">
            <thead><tr><th>Course</th><th>Semester</th><th>Lecturer</th><th>Progress</th><th></th></tr></thead>
            <tbody id="courseRows"></tbody>
          </table>
        </div>
        <div id="courseEmpty" class="text-center text-muted py-4 d-none">
          <i class="bi bi-journal-x" style="font-size:2rem"></i>
          <p class="mt-2 mb-0">No courses yet. Add your first one.</p>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="modal fade" id="courseModal" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content" id="courseForm">
      <div class="modal-header">
        <h5 class="modal-title" id="courseModalTitle">New Course</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" name="id">
        <div class="mb-3"><label class="form-label">Course Name</label><input class="form-control" name="name" required></div>
        <div class="row g-2">
          <div class="col-md-6 mb-3"><label class="form-label">Course Code</label><input class="form-control" name="code" required></div>
          <div class="col-md-6 mb-3"><label class="form-label">Semester</label><input class="form-control" name="semester" placeholder="e.g. Fall 2025"></div>
        </div>
        <div class="mb-2"><label class="form-label">Lecturer</label><input class="form-control" name="lecturer"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-brand">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/courses.js"></script>
<script>renderLayout('Courses'); initCoursesPage();</script>
</body>
</html>
