<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — StudyTrack</title>
<meta name="description" content="Student assignment tracker dashboard with progress, charts, and deadline alerts.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content fade-in">
      <div class="row mb-3">
        <div class="col-12">
          <div class="panel greeting-card">
            <div>
              <h2>Welcome!</h2>
              <p class="lead text-muted mb-0" id="welcomeQuote">Every day is a fresh start — make today meaningful.</p>
            </div>
          </div>
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-6 col-md-4 col-xl-2"><div class="stat-card"><div class="icon bg-brand"><i class="bi bi-journal-bookmark"></i></div><div><div class="label">Courses</div><div class="value" id="statCourses">0</div></div></div></div>
        <div class="col-6 col-md-4 col-xl-2"><div class="stat-card"><div class="icon" style="background:#6366f1"><i class="bi bi-list-check"></i></div><div><div class="label">Assignments</div><div class="value" id="statAssignments">0</div></div></div></div>
        <div class="col-6 col-md-4 col-xl-2"><div class="stat-card"><div class="icon" style="background:#16a34a"><i class="bi bi-check2-circle"></i></div><div><div class="label">Completed</div><div class="value" id="statCompleted">0</div></div></div></div>
        <div class="col-6 col-md-4 col-xl-2"><div class="stat-card"><div class="icon" style="background:#f59e0b"><i class="bi bi-hourglass-split"></i></div><div><div class="label">Pending</div><div class="value" id="statPending">0</div></div></div></div>
        <div class="col-6 col-md-4 col-xl-2"><div class="stat-card"><div class="icon" style="background:#dc2626"><i class="bi bi-exclamation-octagon"></i></div><div><div class="label">Overdue</div><div class="value" id="statOverdue">0</div></div></div></div>
        <div class="col-6 col-md-4 col-xl-2"><div class="stat-card"><div class="icon" style="background:#0ea5e9"><i class="bi bi-graph-up-arrow"></i></div><div><div class="label">Progress</div><div class="value" id="statProgress">0%</div></div></div></div>
      </div>

      <div class="row g-3">
        <div class="col-lg-8">
          <div class="panel mb-3">
            <h2>Overall Progress</h2>
            <div class="progress mb-2"><div class="progress-bar" id="progressBar" role="progressbar" style="width:0%"></div></div>
            <small class="text-muted">Completed assignments across all courses</small>
          </div>
          <div class="panel">
            <div class="d-flex align-items-center justify-content-between mb-2">
              <h2 class="mb-0">Recent Assignments</h2>
              <a href="assignments.html" class="small">View all <i class="bi bi-arrow-right"></i></a>
            </div>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead><tr><th>Title</th><th>Due</th><th>Priority</th><th>Status</th></tr></thead>
                <tbody id="recentRows"></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="panel mb-3">
            <h2>Completion</h2>
            <canvas id="completionChart" height="200"></canvas>
          </div>
          <div class="panel">
            <h2>Deadline Alerts</h2>
            <div id="alerts"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>renderLayout('Dashboard'); renderDashboard();</script>
</body>
</html>
