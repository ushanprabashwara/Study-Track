<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendar — StudyTrack</title>
<meta name="description" content="Monthly calendar view of assignment deadlines color-coded by priority.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content fade-in">
      <div class="panel mb-3">
        <div class="d-flex flex-wrap gap-3 align-items-center">
          <strong>Legend:</strong>
          <span><span class="d-inline-block me-1" style="width:10px;height:10px;border-radius:2px;background:#dc2626"></span>High</span>
          <span><span class="d-inline-block me-1" style="width:10px;height:10px;border-radius:2px;background:#f59e0b"></span>Medium</span>
          <span><span class="d-inline-block me-1" style="width:10px;height:10px;border-radius:2px;background:#16a34a"></span>Low</span>
        </div>
      </div>
      <div id="calendar"></div>
    </main>
  </div>
</div>

<div class="modal fade" id="eventModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="eventModalTitle">Assignment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="eventModalBody"></div>
      <div class="modal-footer">
        <a href="assignments.html" class="btn btn-brand">Go to Assignments</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/calendar.js"></script>
<script>renderLayout('Calendar'); initCalendarPage();</script>
</body>
</html>
