<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assignments — StudyTrack</title>
<meta name="description" content="Track assignments with priorities, statuses, deadlines, search and filters.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content fade-in">
      <div class="panel">
        <div class="d-flex flex-wrap align-items-center justify-content-between mb-3 gap-2">
          <div>
            <h2 class="mb-0">All Assignments</h2>
            <small class="text-muted">Search, filter, and manage your assignments</small>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-brand" id="addAssignmentBtn"><i class="bi bi-plus-lg me-1"></i> Add Assignment</button>
          </div>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-md-4"><input id="searchInput" class="form-control" placeholder="Search by title…"></div>
          <div class="col-md-2"><select id="filterCourse" class="form-select"></select></div>
          <div class="col-md-2"><select id="filterPriority" class="form-select"><option value="">All Priorities</option><option>High</option><option>Medium</option><option>Low</option></select></div>
          <div class="col-md-2"><select id="filterStatus" class="form-select"><option value="">All Statuses</option><option>Not Started</option><option>In Progress</option><option>Completed</option></select></div>
          <div class="col-md-2"><select id="sortBy" class="form-select"><option value="due">Sort: Due Date</option><option value="priority">Sort: Priority</option><option value="title">Sort: Title</option></select></div>
        </div>

        <div class="table-responsive">
          <table class="table align-middle">
            <thead><tr><th>Title</th><th>Course</th><th>Due</th><th>Priority</th><th>Status</th><th></th></tr></thead>
            <tbody id="assignmentRows"></tbody>
          </table>
        </div>
        <div id="assignmentEmpty" class="text-center text-muted py-4 d-none">
          <i class="bi bi-clipboard-x" style="font-size:2rem"></i>
          <p class="mt-2 mb-0">No assignments match your filters.</p>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="modal fade" id="assignmentModal" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content" id="assignmentForm">
      <div class="modal-header">
        <h5 class="modal-title" id="assignmentModalTitle">New Assignment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" name="id">
        <div class="mb-3"><label class="form-label">Title</label><input class="form-control" name="title" required></div>
        <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="2"></textarea></div>
        <div class="row g-2">
          <div class="col-md-6 mb-3"><label class="form-label">Course</label><select class="form-select" name="courseId" required></select></div>
          <div class="col-md-6 mb-3"><label class="form-label">Due Date</label><input class="form-control" type="date" name="dueDate" required></div>
        </div>
        <div class="row g-2">
          <div class="col-md-6 mb-2"><label class="form-label">Priority</label>
            <select class="form-select" name="priority"><option>High</option><option selected>Medium</option><option>Low</option></select>
          </div>
          <div class="col-md-6 mb-2"><label class="form-label">Status</label>
            <select class="form-select" name="status"><option selected>Not Started</option><option>In Progress</option><option>Completed</option></select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-brand">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/assignments.js"></script>
<script>renderLayout('Assignments'); initAssignmentsPage();</script>
</body>
</html>
